<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>apipsn - Ofertas PS Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>apipsn</h1>
        <div class="toolbar">
            <button id="btn-refresh" class="primary">Actualizar ofertas</button>
            <button id="btn-export">Exportar CSV (seleccionados)</button>
            <button id="btn-settings">Ajustes</button>
            <span id="refresh-status"></span>
        </div>
    </header>

    <section id="settings-panel" class="panel hidden">
        <h2>Ajustes de precios</h2>
        <div class="settings-grid">
            <label>USD → CLP <input type="number" id="s-usd" step="1"></label>
            <label>Fee compra % <input type="number" id="s-fee" step="0.01"></label>
            <label>Mult. primaria 1 <input type="number" id="s-p1" step="0.01"></label>
            <label>Mult. primaria 2 <input type="number" id="s-p2" step="0.01"></label>
            <label>Mult. secundaria <input type="number" id="s-sec" step="0.01"></label>
            <label>Redondeo (CLP) <input type="number" id="s-round" step="100"></label>
        </div>
        <button id="btn-save-settings" class="primary">Guardar</button>
        <span id="settings-status"></span>
    </section>

    <section class="filters">
        <input type="search" id="search" placeholder="Buscar por nombre...">
        <label>Dcto mínimo %:
            <input type="number" id="min-discount" value="0" min="0" max="100" step="5">
        </label>
        <label><input type="checkbox" id="only-selected"> Solo seleccionados</label>
        <label><input type="checkbox" id="hide-published"> Ocultar publicados</label>
        <label>Orden:
            <select id="sort">
                <option value="discount">Mayor descuento</option>
                <option value="price">Menor precio</option>
                <option value="name">Nombre</option>
            </select>
        </label>
        <span id="count"></span>
    </section>

    <main>
        <table id="games">
            <thead>
                <tr>
                    <th></th>
                    <th>Juego</th>
                    <th>Plataforma</th>
                    <th>USD</th>
                    <th>Dcto</th>
                    <th>Costo CLP</th>
                    <th>Primaria 1</th>
                    <th>Primaria 2</th>
                    <th>Secundaria</th>
                    <th>Fin oferta</th>
                    <th>Sel.</th>
                    <th>Pub.</th>
                </tr>
            </thead>
            <tbody id="games-body"></tbody>
        </table>
    </main>

    <script src="app.js"></script>
</body>
</html>
